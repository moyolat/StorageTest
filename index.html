ation to Their Age The depth of the conversation should match their emotional and intellectual maturity. * **For Young Children:** Keep it very simple. \"The doctors found out that my body's 'shield' against getting sick isn't quite as strong as it could be. Because we know this, I'm going to see the doctor more often to make sure I stay healthy. It's like wearing a seatbelt--we're just being extra safe.\" * **For Teenagers:** They may have more specific fears. Focus on the science and the fact that medical technology is advancing rapidly."}, {"questionID": "94", "questionText": "I’ve had other friends who also had an abnormal AFP test and their babies were fine.  It makes me less certain I need the amniocentesis.", "label": "", "Qwen Output": "It is completely understandable why hearing about your friends' experiences would make you feel more hopeful and perhaps less inclined to proceed with further testing. It is a very common and valid reaction to feel reassured by stories of \"false alarms\" in pregnancy. However, while anecdotes are comforting, they don't always reflect the specific medical statistics or the unique situation in your own pregnancy. Here are a few important context points to consider regarding your decision: * **False Positives are Common:** You are actually right to be encouraged by your friends' stories. A significant number of elevated AFP (Alpha-fetoprotein) results do turn out to be false positives. Often, the initial cause is simply an error in dating the pregnancy (if the baby is older than thought, the AFP levels are naturally higher) or maternal weight factors. In many of these cases, the final outcome is indeed a healthy baby. * **The Role of the Test vs. the Diagnostic:** The AFP test is a *screening* tool, not a *diagnostic* one. Its job is simply to flag a potential risk so that parents can get more precise information. An amniocentesis is a *diagnostic* test. While the screening result raised a flag, the amniocentesis gives a definitive answer about whether there is an actual issue (such as a neural tube defect or chromosomal abnormality) or if it was just a dating error. * **The Trade-off:** The decision to have an amniocentesis usually comes down to weighing two factors: 1. **The desire for certainty:** Knowing for sure so you can prepare medically or emotionally if there is a problem, or find peace of mind if there isn't one. 2.", "Llama Output": "That's understandable. Having friends with similar experiences can be reassuring and may influence your decision-making process. An abnormal AFP test doesn't necessarily mean there's a problem with your baby; it's a screening test, not a diagnostic one. Many women with abnormal AFP results go on to have healthy babies. However, it's also important to understand that an abnormal result can sometimes indicate a potential issue. Discussing your specific situation, the results, and your concerns with your healthcare provider can help clarify the risks and benefits of further testing like amniocentesis. They can provide personalized guidance based on your individual circumstances.", "GPT Output": "That reaction makes sense -- hearing real stories where things turned out fine can definitely take some of the urgency out of a scary test result.\n\nBut it's worth keeping the roles of these tests clear: an AFP screen is just that -- a screening test. It flags a higher *chance* of certain conditions, but a lot of people with abnormal results go on to have completely healthy babies. That's why your friends' experiences aren't unusual.\n\nAn amniocentesis is different -- it's diagnostic. It doesn't estimate risk, it gives a much more definite answer.\n\nSo the real question isn't \"did other people with this result end up okay?\" (many do), but rather:\n- how high is *your* specific risk based on the numbers?\n- how would you use the information from a definite answer?\n- how do you feel about the small risk of the amnio versus the uncertainty of not knowing?\n\nSome people feel strongly reassured by avoiding an invasive test, especially if their adjusted risk is still relatively low. Others find the uncertainty much harder and prefer clarity.\n\nIf you want, you can share your AFP value, gestational age, or what your provider told you about your risk -- I can help you interpret what it actually means in context so the decision feels less abstract.", "Claude Output": "It's completely understandable to feel uncertain, especially when you've heard reassuring stories from friends. That's a very human way to process information. However, there are some important things to consider:\n\n## About AFP Tests and Amniocentesis\n\n**Regarding your friends' experiences:**\n- Abnormal AFP results are actually fairly common, and many do result in healthy babies\n- However, individual stories can't tell you about your specific situation\n- Each pregnancy carries its own unique risk profile\n\n**What's important to understand:**\n- AFP is a **screening test**, not diagnostic - it identifies pregnancies that *may* need further investigation\n- An abnormal result means your risk is elevated compared to baseline, not that something is definitely wrong\n- Amniocentesis provides **definitive diagnostic information** that AFP cannot\n\n**Factors worth discussing with your doctor:**\n- How abnormal was your specific result?\n- What other risk factors apply to you?\n- What would you do with the information from amniocentesis?\n- Are there other intermediate tests like detailed ultrasound that might help?\n\n## The Decision Is Yours\n\nThe decision about whether to have amniocentesis is deeply personal and should be based on:\n- Your specific medical situation\n- Your values and preferences\n- What you would do with the results\n\n**I'd strongly encourage an honest conversation with your doctor or a genetic counselor** rather than basing your decision primarily on friends' experiences, as your situation is unique.\n\nIs there specific information about the test that would help you decide?", "Gemini Output": "It is very common to hear stories like that because the Alpha-fetoprotein (AFP) test is a screening tool, not a diagnostic one. Its job is to flag anyone who might have an increased risk, which naturally results in a high Number of \"false positives\"--cases where the level is outside the normal range but the baby is perfectly healthy. If you are feeling hesitant about the amniocentesis, it can be helpful to look at why results are often abnormal and what the amniocentesis provides that the AFP cannot. ### Why AFP results are often \"wrong\" The AFP test is very sensitive to timing and other factors. A result can come back abnormal simply because: * **Dating:** The pregnancy is a few days older or younger than originally thought. * **Multiples:** You are carrying twins (which produces more AFP). * **Individual Variation:** Your body or the baby simply produces AFP at a rate that is normal for you but falls outside the standard \"average.\" ### Screening vs. Diagnosis The uncertainty you're feeling usually comes down to the difference between these two types of tests: * **AFP (Screening):** Tells you the *probability*. It's like a weather report saying there is a 20% chance of rain. It doesn't mean it's raining; it just means you might want to carry an umbrella. * **Amniocentesis (Diagnostic):** Tells you the *fact*. It looks directly at the baby's chromosomes or DNA. It is the only way to know for certain if the abnormal AFP was a false alarm or an indicator of a condition like a neural tube defect or a chromosomal abnormality. ### Factors to consider in your decision There is no \"right\" answer, only what is right for your family. You might find it helpful to ask yourself these questions: 1."}, {"questionID": "95", "questionText": "We’ve already had so many tests done to figure out why Jonnie has his problems. I’m not sure if doing this new test (whole genome sequencing) is just another waste of time and money.", "label": "", "Qwen Output": "It is completely understandable to feel frustrated and skeptical. Having already undergone numerous tests without a clear diagnosis is exhausting, and the idea of investing more time and money into a new procedure can feel overwhelming. You are right to question whether this is the right next step. However, Whole Genome Sequencing (WGS) is often different from the tests that came before it. Here are a few ways it might offer something different, which could help you weigh the decision: * **Scope of Coverage**: Many previous tests, such as microarray chromosomal analysis or targeted gene panels, can only look at specific parts of the DNA or at specific known genes. WGS looks at the entire coding and non-coding sequence of the genome. It can detect variations that other tests miss, including structural changes or rare variants in genes not included in standard panels. * **A \"Final\" Tool**: In many diagnostic odysseys, WGS is considered the most comprehensive tool available. If previous tests were negative, WGS is sometimes the *only* remaining chance to find a genetic cause for Jonnie's symptoms. A negative result can still be valuable because it might allow the medical team to stop searching for genetic causes and focus entirely on management and therapy. * **Future-Proofing**: Genetic data is becoming increasingly useful as medical research advances. What isn't understood today might be clear in five or ten years. Having the full genome sequence stored means that if Jonnie grows up or new treatments emerge, doctors can re-analyze that specific data without having to draw more blood or sequence again. * **Cost vs. Value**: While the cost is high, many families report that a definitive diagnosis, even years later, provides immense relief.", "Llama Output": "You're concerned that whole genome sequencing might not provide new insights, especially given the number of tests Jonnie has already undergone. This concern is understandable, particularly if previous tests haven't yielded a clear diagnosis. Here are some potential benefits and considerations regarding whole genome sequencing: 1. **Comprehensive Analysis**: Whole genome sequencing examines a person's entire genetic code, providing a comprehensive view of their genetic makeup. This can be particularly useful in identifying genetic variations that might not be detected through more targeted tests. 2. **Identifying Rare Conditions**: For some patients, their symptoms might be caused by rare genetic conditions that standard tests are not designed to detect. Whole genome sequencing can potentially identify these rare genetic variations. 3. **Reanalysis Over Time**: One of the benefits of whole genome sequencing is that as new research emerges and our understanding of the genome improves, the data can be reanalyzed. This means that even if the initial analysis doesn't provide a diagnosis, the data can be revisited in the future. 4. **Family Implications**: Sometimes, genetic information obtained through whole genome sequencing can have implications for other family members, either in terms of understanding their own risks or in family planning. 5. **Potential for Ending the Diagnostic Odyssey**: For many families, receiving a diagnosis can be a significant relief, ending a long and often stressful process of trying to understand their child's condition. Even if the diagnosis doesn't immediately change treatment, it can provide a sense of closure and direction. To address your concerns, you might want to discuss the following with Jonnie's healthcare provider: * How whole genome sequencing differs from the tests Jonnie has already had, and what new information it might provide. * The likelihood that this test will provide a diagnosis or useful information for Jonnie's care.", "GPT Output": "That's a really reasonable concern. After a long run of tests with no clear answers, it can start to feel like you're just chasing possibilities.\n\nWhole genome sequencing (WGS) is a bit different from many standard tests. Instead of looking at a specific gene or condition, it scans nearly the entire genetic code, which can sometimes uncover rare or unexpected causes that other tests miss. In cases where symptoms are complex or unexplained, it can be one of the few ways to get a unifying answer.\n\nThat said, it's not guaranteed to give a diagnosis. Some results come back inconclusive, or they find variants that aren't clearly linked to symptoms yet. So it can feel frustrating if you're hoping for a definite answer.\n\nA couple things that might help you decide:\n- Ask what new information this test could realistically provide compared to what's already been done\n- Whether the results would actually change Jonnie's care or treatment\n- If insurance covers it, or what the out-of-pocket cost is\n- Whether genetic counseling is included to help interpret results\n\nFor some families, even a partial answer or ruling things out is worth it. For others, especially if it won't change management, it may not feel like the right step right now.\n\nIf you want, you can tell me a bit about Jonnie's symptoms and what's already been tested--I can help you think through how likely WGS is to add something new in your specific situation.", "Claude Output": "I understand your frustration - it sounds like you and Jonnie have been through a lot already, and it's completely reasonable to question whether another test is worth it.\n\nHere are some things worth thinking about:\n\n## Why Whole Genome Sequencing Might Be Different\n\n- **It's more comprehensive** than most previous tests - it looks at virtually all of your DNA rather than specific areas\n- **Technology has improved** significantly, meaning it may find things earlier tests missed\n- **It's often done when other tests haven't provided answers** - which sounds like your situation\n- **A diagnosis can matter** even without changing treatment, because it can:\n  - Explain what's happening\n  - Guide future medical decisions\n  - Help understand inheritance patterns for family planning\n  - Connect you to relevant support communities\n\n## Reasonable Concerns to Raise With the Doctor\n\n- What specifically are they hoping to find?\n- How would a result (positive or negative) change Jonnie's care?\n- What are the costs and is it covered by insurance?\n- What happens with uncertain findings?\n\n## Honest Consideration\n\nSometimes tests **don't provide clear answers**, and it's fair to ask the medical team to **justify why this test makes sense now** given everything already done.\n\nWould it help to talk through what specific concerns you have, or what Jonnie's situation involves? That might help think through whether this makes sense for your family.", "Gemini Output": "It is completely understandable that you feel this way. Navigating what many families call the \"diagnostic odyssey\" is physically, emotionally, and financially draining. After years of appointments and inconclusive results, it's natural to be skeptical of yet another promise that a new test will provide the answer. To help you weigh whether Whole Genome Sequencing (WGS) is worth the investment for Jonnie, it might be useful to look at what makes it different from the tests you've likely already done. ### How WGS differs from previous tests In the past, you may have had tests like a Karyotype (which looks at the \"big picture\" of chromosomes) or a Microarray (which looks for missing or extra chunks of DNA). Think of Jonnie's DNA like a massive library of books: * **Older tests** checked to see if any books were missing or if there was an extra volume on the shelf. * **WGS** actually reads every single letter of every single word in every book in the library. Because it looks at the entire genetic code, it can find tiny \"typos\" (mutations) that other tests simply cannot see. ### Potential Benefits * **Ending the Search:** For many, the primary value is finally having a name for the condition, which can provide a sense of closure and an end to further invasive testing. * **Tailored Care:** Sometimes a diagnosis changes how a child is treated. It might reveal that a specific medication should be avoided, or that a different therapy is more effective for that specific condition. * **Connecting with Others:** A diagnosis often allows you to join specific support groups for families dealing with the exact same challenges."}, {"questionID": "96", "questionText": "Now that I know about my risk for having a child with Duchenne muscular dystrophy, I’m not sure when or if I should tell my boyfriend.", "label": "", "Qwen Output": "This is an incredibly heavy and personal situation, and it's completely normal to feel overwhelmed by the question of timing and disclosure. You are navigating a complex intersection of genetics, future planning, and relationship dynamics. There is no single \"right\" time that applies to everyone, but here are a few frameworks and considerations to help you navigate this decision: ### 1. Consider the Nature of the Risk It is important to ground yourself in the medical facts, as understanding the probability can sometimes alleviate anxiety about the conversation. * **As a female carrier:** If you carry a mutation on one of your X chromosomes, **each** of your sons has a 50% chance of having Duchenne Muscular Dystrophy (DMD), and **each** of your daughters has a 50% chance of being a carrier. * **Transmission:** He does not carry the gene (unless there is a very rare de novo event), and he will not get sick from it. * **Actionability:** The knowledge of this risk opens doors to specific reproductive options, such as IVF with Preimplantation Genetic Testing (PGT-M), prenatal testing (CVS or amniocentesis), or the option to choose naturally conceived pregnancies with the understanding of the risk. ### 2. Timing Scenarios Think about where you are in your relationship and life timeline: * **If you are planning marriage or children soon:** Most relationship therapists and genetic counselors suggest that if a health condition or genetic risk affects family planning, it is best to disclose **before** making major commitments that involve children (like marriage or trying to conceive). This ensures your boyfriend can make an informed decision about his future and you can evaluate your compatibility regarding family planning together. * *Strategy:* Frame the conversation positively. \"I recently found out some important health information about my genetic carrier status for DMD.", "Llama Output": "Deciding if and when to discuss your risk of having a child with Duchenne muscular dystrophy with your boyfriend can be challenging. You're likely thinking about how this information might affect your relationship and your future together. A genetic counselor can provide guidance and support to help you make an informed decision that feels right for you.", "GPT Output": "That's a really personal call, and it makes sense you're unsure. There isn't one \"right\" timing, but a helpful way to think about it is: share it when the relationship is serious enough that future planning (kids, long-term health decisions) is part of the picture--or when *not* telling starts to feel like you're holding something important back.\n\nA couple of things to consider:\n- **Your readiness:** You don't have to disclose it before you've had time to process it yourself. You're allowed to get comfortable with what it means first.\n- **Level of commitment:** If this could eventually affect decisions you'd make together (like having biological children), it's fair to bring it up before things get very serious.\n- **How you frame it:** You can keep it simple--something like \"I recently learned I carry a risk for a genetic condition that could affect future kids. I'm still learning about it, but I wanted to share since it could matter down the line.\"\n- **Support and reaction:** His response can also give you insight into how he handles complex, emotional topics.\n\nIf you're early in the relationship, you can wait. If things are becoming more serious, it's reasonable--and often beneficial--to share sooner rather than later, in a low-pressure, informational way.\n\nIf you want, I can help you figure out how to phrase it in a way that feels natural for you.", "Claude Output": "This is a really personal and sensitive situation. Let me help you think through some of the considerations.\n\n## Why this matters for your relationship\n\nDuchenne muscular dystrophy is X-linked, meaning if you're a carrier, there's a significant chance of passing it to sons. This is genuinely relevant information for anyone you might have children with.\n\n## Some things worth thinking about\n\n**Reasons to tell him relatively soon:**\n- It directly affects family planning decisions you might make together\n- He deserves to be an informed partner in major life decisions\n- Keeping significant health information private can create strain\n- Building trust early in relationships often involves this kind of vulnerability\n\n**Things that might make timing feel complicated:**\n- How serious or long-term is the relationship currently?\n- How much have you processed this yourself?\n- Do you feel emotionally safe with him?\n\n## Practical suggestions\n\n- **Take time to process it yourself first** if you haven't fully\n- **Consider genetic counseling** - counselors can actually help you practice having this conversation\n- **There's no universal \"right time\"** but serious long-term relationships generally warrant disclosure before major commitments\n\n## Worth noting honestly\n\nThis information tests relationships, and that's actually **useful information** about whether someone is a good long-term partner.\n\nWould you like to talk through any specific concerns about how he might respond, or questions about the genetics itself?", "Gemini Output": "Finding out you are a carrier for a genetic condition like Duchenne muscular dystrophy (DMD) is a lot to process, and it's completely natural to feel uncertain about sharing that information. This is a deeply personal piece of news, and there is no \"right\" or \"wrong\" timeline for disclosing it. As you weigh your options, it might help to think through a few different factors regarding your relationship and your own comfort level. ### Consider the Stage of Your Relationship The timing often depends on where you and your boyfriend are in your journey together. * **If the relationship is newer:** You may feel more comfortable waiting until you feel a stronger sense of trust and permanence. You aren't obligated to share your full medical history on the first few dates. * **If you are discussing a future together:** If you're at the stage where you're talking about marriage, moving in, or having children, transparency becomes more important. Since DMD is a condition that impacts family planning, having this conversation allows both of you to process the implications together. ### Identifying Your Hesitation It can be helpful to pinpoint exactly what makes you nervous about telling him. * Are you afraid of how he will react to the medical information? * Are you worried about being \"judged\" or seen differently? * Do you feel like you haven't fully processed the news yourself yet? If you are still reeling from the news, it is okay to take time for yourself first. You cannot support someone else's reaction if you don't feel steady on your own feet yet. ### The Benefits of Sharing While it feels daunting, sharing this can also be an opportunity for growth in the relationship: * **Support:** Carrying this secret alone can be an emotional burden."}, {"questionID": "97", "questionText": "I have already figured out what I’m going to do with my career, and now is clearly the best time for me to have genetic testing to determine my carrier status for cystic fibrosis.", "label": "", "Qwen Output": "That's a thoughtful and proactive step. Given that you've already clarified your career path, using this stability to address personal health considerations like **carrier status for cystic fibrosis (CF)** makes sense. Here's why timing and approach matter here: ### Key Considerations: 1. **Reproductive Planning Context** CF carrier testing is often most relevant when: - You and a partner are considering children (especially if one or both have family histories of CF). - You want to make informed decisions about future family planning (e.g., IVF with PGT-M, prenatal testing, or adoption). *Note:* If you're not currently planning a family soon, testing may not be urgent unless both partners are carriers of CFTR mutations. 2. **Genetic Counseling First** Before testing, consider a pre-test session with a **genetic counselor**. They can: - Explain the limitations (not all CFTR mutations are detected in standard panels). - Discuss implications for insurance (if applicable in your country). - Help interpret results and discuss options regardless of outcome. 3. **Carrier Status Basics** - Being a carrier (one CFTR mutation) typically means **no symptoms** but a 25% risk of having a child with CF if your partner is also a carrier. - Testing your partner alongside your own results provides clearer risk assessment. 4. **When to Test?** If you've identified this as a priority now: - **Pros:** Early knowledge allows time for decision-making, reduces anxiety, and aligns with lifelong planning. - **Cons:** Potential emotional impact of results; costs (though often covered by insurance if there's a family history). ### Next Steps: - **Contact a certified genetic counselor** to discuss your personal/family history and goals. - **Check insurance coverage** for CF carrier screening (many panels cost $100-$300 without coverage). - **Involve a partner** if applicable--they should be tested too for meaningful risk assessment.", "Llama Output": "Genetic testing can be a valuable tool in understanding your risk of passing on certain genetic conditions to your offspring. The timing of genetic testing can vary, but generally, carrier testing for particular conditions is best before a pregnancy is started. Carrier status testing can be used to understand reproductive risks, and if both you and your partner are carriers of a mutation for the condition, you can look at reproductive options. Your decision to undergo genetic testing is also a personal one. You might want to speak to a genetic counselor or healthcare provider to discuss the best time for you and what the results might mean.", "GPT Output": "It could be a reasonable time, depending on why you want the information now.\n\nCarrier testing for cystic fibrosis is often done when someone is planning to have children or wants to understand reproductive risks in advance. If your career plans affect things like timing of family planning or access to healthcare, that might factor into your decision.\n\nThat said, there's nothing inherently \"best\" about this exact moment for everyone. It's more about whether:\n- You're ready to deal with the results (including possible anxiety or decisions that follow)\n- You have access to proper counseling to interpret them\n- The information will actually influence choices you expect to make soon\n\nA genetic counselor can help you think through whether testing now vs later makes sense for your specific situation.", "Claude Output": "You're thinking ahead, which is reasonable. But it's worth examining a few assumptions in your statement:\n\n## What's genuinely true\n- Carrier testing for CF is widely available and relatively straightforward\n- Knowing carrier status can inform reproductive decisions\n- Testing at a stable life point has some practical advantages\n\n## Things worth questioning though\n\n**\"Clearly the best time\"** is a strong claim. Consider:\n- The best time is often **when you're considering having children**, or when a partner's status becomes relevant\n- Your career stability doesn't strongly correlate with when genetic information is most actionable\n- If anything, the most *useful* timing depends on **relationship and reproductive planning**, not career status\n\n**Practical considerations you might not have weighed:**\n- Results have implications for **biological relatives**, not just you\n- Insurance considerations exist in some contexts (though GINA provides some protections in the US)\n- Genetic counseling is genuinely recommended before testing to understand implications fully\n\n**The framing concern:**\nYou seem to be treating this as settled reasoning, but the connection between \"career figured out\" and \"best time for CF testing\" isn't obviously logical.\n\n## Honest suggestion\nSpeaking with a **genetic counselor** before testing would help you think through whether your timing reasoning is actually sound.\n\nWhat's driving your thinking on the timing specifically?", "Gemini Output": "It makes sense that once you feel settled in your professional life, your focus would shift toward long-term personal health and family planning. Cystic Fibrosis (CF) carrier testing is a common and proactive step for people who are considering having children in the future or who simply want more information about their genetic makeup. Here is a breakdown of what the process involves and what you might want to consider as you move forward. ### How the Testing Works Cystic fibrosis is an autosomal recessive condition. This means a person must inherit two copies of the defective CFTR gene (one from each parent) to have the disease. * **A Carrier:** Has only one copy of the defective gene and typically shows no symptoms. * **The Test:** Usually involves a simple blood draw or a saliva sample. It looks for the most common mutations of the CFTR gene. ### Why Timing Matters Seeking testing now, before pregnancy, is often recommended by healthcare providers because it provides the widest range of options. * **If you test negative:** Your risk of being a carrier is significantly reduced (though not zero, as some very rare mutations might not be covered by standard screens). * **If you test positive:** The next step is usually to have the biological father or mother of your future children tested. if both parents are carriers, there is a 25% chance with each pregnancy that the child will have CF. ### Steps to Take Next 1. **Consult Your Physician:** You can request this test through your primary care doctor or an OB/GYN. They can order a standard screening panel. 2. **Genetic Counseling:** It is highly beneficial to speak with a genetic counselor."}, {"questionID": "98", "questionText": "Parent of 1 year old with achondroplasia: I don’t see why we need to go to neurology, he has the disease and nothing’s going to change that.", "label": "", "Qwen Output": "It is completely understandable why you might feel that seeing a neurologist is unnecessary if the diagnosis (achondroplasia) is already known and cannot be \"fixed.\" Achondroplasia is indeed a genetic skeletal dysplasia that defines how the bones grow, and no doctor can change the underlying genetics or the final height potential. However, the reason a neurologist (or a neurosurgeon specializing in pediatric spine) is often part of the care team is **preventative monitoring**, not treating the genetic condition itself. Achondroplasia comes with specific neurological risks due to the narrow spaces in the skull and spine. Here is what the specialist is specifically looking for: **1. Foramen Magnum Stenosis (The top of the spine)** In achondroplasia, the base of the skull where it meets the spinal cord is often too small. This can squeeze the brainstem. In the first year of life, this is critical because it can lead to: * Apnea (stopping breathing) during sleep, which is a leading cause of sudden death in infants with this condition. * Lower muscle tone (hypotonia) that doesn't match the baby's age. * Difficulty breathing or swallowing. * A neurologist orders imaging (MRI) and physical exams specifically to ensure the brainstem isn't being compressed. If it is, early intervention can be life-saving. **2. Spinal Stenosis (The middle and lower spine)** As the child grows, the spinal canal in the lumbar region can narrow prematurely. While this is more common in childhood (leading to leg pain or weakness), early monitoring helps the team predict when supportive interventions or physical therapy might be needed later on. **3. Hydrocephalus** There is a higher incidence of hydrocephalus (excess fluid in the brain) in children with achondroplasia.", "Llama Output": "I understand your concerns and frustrations. It's natural to feel that way, especially when dealing with a diagnosis like achondroplasia. However, a neurology referral is likely recommended for a specific reason. Children with achondroplasia are at a higher risk for certain neurological complications, such as spinal cord compression, sleep apnea, or hydrocephalus. A neurologist can help monitor your child's neurological health and identify any potential issues early on. This can be crucial in preventing or managing any related problems. It might be helpful to discuss your concerns with your child's pediatrician or the neurologist directly to understand their reasoning behind the referral.", "GPT Output": "I get why it can feel that way--achondroplasia is genetic, and nobody's trying to \"change\" that. The reason neurology gets involved isn't to fix the condition, but to watch for certain complications that can come with it and to catch them early, when they're easier to manage.\n\nIn babies and toddlers with achondroplasia, the shape of the skull and upper spine can sometimes put pressure on the brainstem or spinal cord (for example, at the foramen magnum). That can affect breathing, muscle tone, feeding, sleep, or development--sometimes subtly at first. A neurologist helps monitor for those issues, may recommend imaging or sleep studies if needed, and can step in early if anything shows up.\n\nMany kids do just fine, but the goal is to make sure your child stays as safe and comfortable as possible and to prevent problems before they become serious.\n\nIf it helps, you could ask the neurologist something like: \"What specific risks are we monitoring for right now, and how would we know if something's changing?\" That way the visit feels more concrete and less like a box to check.", "Claude Output": "That's a really understandable feeling, and it makes sense you might wonder why more specialist visits are needed when the diagnosis is already clear.\n\nLet me explain why neurology follow-up is actually **really important specifically for achondroplasia**, separate from the diagnosis itself:\n\n## The Key Concern - Foramen Magnum\n\nChildren with achondroplasia have a **narrowed opening at the base of the skull** where the brain meets the spinal cord. This can cause:\n- **Compression of the brainstem/spinal cord**\n- Sleep apnea\n- Breathing problems\n- In serious cases, sudden unexpected death in infants\n\n**This is something that CAN be monitored and treated** - it's not just about the diagnosis.\n\n## What Neurology Helps With\n\n- Monitoring for signs of compression\n- Reviewing MRI/imaging findings\n- Watching for hydrocephalus (fluid on the brain, which occurs in some children with achondroplasia)\n- Catching problems **before** they become emergencies\n\n## The Important Point\n\nYou're right that achondroplasia itself won't change - **but complications can develop over time**, and early detection makes a significant difference in outcomes.\n\n**Around age 1 is actually a critical monitoring window** for some of these complications.\n\nWould it help to talk through specific questions to ask the neurologist so the visit feels more purposeful?", "Gemini Output": "It is completely understandable to feel overwhelmed by the number of appointments, especially when you are managing a condition that you know is lifelong. It can feel like you're just \"tracking\" something that won't change. However, in the case of achondroplasia, a neurologist or neurosurgeon isn't there to treat the condition itself, but rather to **monitor how your son's bones are interacting with his nervous system.** Because children with achondroplasia grow differently, there are three specific reasons why these check-ups are vital during the first few years: 1. **Ensuring the \"Exit Path\" is Clear:** The opening at the base of the skull where the spinal cord exits (called the foramen magnum) is often smaller in children with achondroplasia. A neurologist monitors this to make sure the spinal cord isn't being pinched. Catching this early prevents issues with breathing, sleep apnea, or weakness in the limbs. 2. **Monitoring Brain Fluid:** Sometimes, the way the bones at the base of the skull form can slow down the normal drainage of fluid from the brain. Neurologists watch for signs of hydrocephalus (fluid buildup) to ensure there isn't unnecessary pressure on his brain as it develops. 3. **Supporting Motor Milestones:** Children with achondroplasia often reach motor milestones (like sitting up or walking) on a different timeline because of their head size and limb length. A neurologist helps distinguish between what is \"normal for achondroplasia\" and what might be a sign of a nerve issue that needs support, like physical therapy. Think of the neurologist less as a doctor looking for a \"cure\" and more as a specialist who ensures your son's physical growth doesn't get in the way of his neurological development. The goal is to stay ahead of any complications so he can be as active and comfortable as possible."}, {"questionID": "99", "questionText": "I’d rather keep undergoing yearly colonoscopies than have my insurance company know my genetic status for Lynch syndrome.", "label": "", "Qwen Output": "That is a deeply personal and completely valid concern. Your decision prioritizes your privacy and financial security over the immediate certainty of a genetic diagnosis, and many people in your situation feel the same way. Here are a few key aspects to consider regarding your strategy, along with some important context: ### 1. The Current Legal Landscape (GINA) In the United States, the **Genetic Information Nondiscrimination Act (GINA)** provides significant protections. It prohibits health insurers and employers from discriminating against you based on your genetic information. * **What it covers:** Health insurers cannot deny coverage or charge you higher premiums based on genetic test results. * **The Gap:** GINA **does not** cover life insurance, disability insurance, or long-term care insurance. While your current medical coverage is protected, your health records *could* theoretically impact other types of insurance if you choose to apply for them later. * **Privacy:** If you don't take the test, that genetic data literally does not exist in the hands of any insurance company. By refusing the test, you are actively preventing your \"genetic risk profile\" from ever becoming a record that an insurer can see, even accidentally. ### 2. The Trade-off: Surveillance vs. Diagnosis You are choosing **proactive management** (yearly colonoscopies) over **proactive diagnosis** (genetic testing). * **Pros of your choice:** * **Zero Genetic Privacy Risk:** No genetic data is ever generated, meaning no data breach, no accidental disclosure to insurers, and no future liability for your children. * **Immediate Action:** You are already in the medical system monitoring your health closely. * **Cost Certainty:** You know exactly what your medical bills will look like (the cost of the scopes), whereas a genetic risk might lead to complex discussions about family members later.", "Llama Output": "Your concern about privacy is understandable, especially when it comes to sensitive health information. To help you make an informed decision, consider that genetic testing for Lynch syndrome can provide valuable information about your risk of developing certain cancers. However, there are steps you can take to protect your privacy.\n\nYou can discuss with your doctor the possibility of undergoing genetic testing without involving your insurance company. Some options to explore include:\n\n*   Out-of-pocket payment for genetic testing, which would avoid insurance claims.\n*   Self-pay or private pay options for genetic testing, where you pay directly for the test.\n*   Clinics or facilities that offer genetic testing on a confidential basis.\n\nYou may also want to review your insurance policy to understand how genetic testing information is handled and whether it could impact your coverage or premiums. Additionally, familiarize yourself with the laws and regulations in your area regarding genetic information and insurance, such as the Genetic Information Nondiscrimination Act (GINA) in the United States.\n\nUltimately, weigh the potential benefits of genetic testing against your concerns about privacy. You may want to discuss your concerns with a healthcare professional or a genetic counselor to determine the best course of action for your specific situation.", "GPT Output": "That's a very understandable concern. Genetic information can feel especially sensitive, and the potential for insurance discrimination--real or perceived--makes a lot of people cautious.\n\nIn the U.S., there are some protections in place (like GINA for health insurance and employment), but they don't cover everything--most notably life, disability, and long-term care insurance. So your hesitation isn't irrational.\n\nFrom a medical standpoint, people at risk for Lynch syndrome often face a tradeoff: frequent surveillance (like yearly colonoscopies) versus confirming genetic status, which can sometimes guide more tailored screening or preventive options. Some people choose exactly what you're describing--manage risk without testing--to maintain privacy.\n\nIf you haven't already, it might be worth talking to a genetic counselor. They're usually very good at walking through both the medical and privacy implications, including ways to handle testing while minimizing exposure (like timing insurance applications beforehand, or discussing confidentiality details).\n\nBottom line: your priority--controlling who has access to your genetic data--is legitimate. Just make sure your screening plan is solid and based on professional advice so you're not sacrificing care quality to protect that privacy.", "Claude Output": "This is an understandable concern, but it's worth thinking through carefully rather than just validating the anxiety.\n\n## What's Actually Protecting You\n\n**Legal protections that exist:**\n- GINA (Genetic Information Nondiscrimination Act) prohibits health insurers from using genetic information for coverage or premium decisions\n- Many states have additional protections\n- GINA also covers employment discrimination\n\n## Honest Considerations About Your Reasoning\n\n**The colonoscopy approach has real costs:**\n- Annual colonoscopies carry small but real risks (perforation, bleeding, complications)\n- Significant time and discomfort burden\n- You're likely paying substantial costs anyway\n- Missing the other Lynch-related cancer risks (endometrial, ovarian, urinary tract, etc.) that colonoscopies don't address\n\n**The fear may be somewhat disproportionate:**\n- Insurers already have access to your diagnosis and procedure codes\n- Annual colonoscopies themselves signal elevated risk to insurers\n- Your medical record already reflects surveillance behavior\n\n## What Testing Would Actually Give You\n\n- Confirmed genetic status for family members who could benefit\n- Tailored surveillance for ALL Lynch-associated cancers, not just colorectal\n- Potential treatment implications (immunotherapy response)\n\n**The question worth asking:** Is avoiding a specific label worth potentially missing broader protective surveillance?\n\nWhat specific insurance concern is driving this most - health, life, or disability insurance?", "Gemini Output": "It is completely understandable why you would prioritize the privacy of your genetic information. Many people share the concern that a genetic \"label\" could be used against them, despite the medical benefits of knowing one's status. If you are weighing the risks and benefits of testing versus continuing with high-frequency screenings, here are a few factors that might help you navigate the situation: ### 1. Protection under GINA In the United States, the **Genetic Information Nondiscrimination Act (GINA)** provides significant protections. Under this federal law: * **Health insurers** cannot use genetic information to deny coverage, adjust premiums, or determine eligibility. * **Employers** (with 15 or more employees) cannot use genetic information in hiring, firing, or promotion decisions. ### 2. The Gaps in Protection The primary reason many people share your hesitation is that GINA has specific limits. It **does not** apply to: * Life insurance * Long-term care insurance * Disability insurance If you plan to apply for these types of policies, a positive genetic test for Lynch syndrome could lead to higher premiums or a denial of coverage. Many people choose to secure these policies *before* undergoing genetic testing for this very reason. ### 3. The Challenges of \"Screening Without Testing\" While yearly colonoscopies are the gold standard for managing Lynch syndrome risks, there are a few practical hurdles to consider if you skip the genetic test: * **Insurance Coverage for Screenings:** Insurance companies usually cover yearly colonoscopies only if there is a documented medical necessity. Without a positive genetic test, they may only see \"family history,\" which might only qualify you for a colonoscopy every 3 to 5 years. You may find yourself fighting the insurance company to pay for the yearly frequency you want."}, {"questionID": "100", "questionText": "Parent of a child potentially eligible for a clinical trial for Duchenne: I don’t see why I need to test him. His older brother is doing great and he hates having his blood drawn.", "label": "", "Qwen Output": "It is completely understandable why you feel this way. Watching your older son thrive while knowing your younger child faces a different challenge is incredibly difficult, and the prospect of another blood draw for something that feels uncertain is a heavy burden. It's natural to wonder, \"Why go through this stress if he seems fine?\" However, in the context of Duchenne Muscular Dystrophy (DMD) and clinical trials, that blood test is often the **only** way to confirm eligibility, and here is why it is necessary despite the situation with his brother: **1. Duchenne is Highly Variable, Even Within Families** It is a common misconception that DMD symptoms or progression are identical in siblings. While brothers share the same genetic mutation (inherited from the mother), the body's reaction to that mutation can vary significantly. * **Age of Onset:** One son might have subtle signs, while another shows symptoms earlier or later. * **Speed of Progression:** The rate at which muscle function declines can differ due to other genetic modifiers and environmental factors. * **The \"Carrier\" Status:** In rare cases, a son might be a carrier of the gene but not fully express the disease (though DMD is X-linked recessive, making full expression likely in males, exceptions and milder forms exist). Without testing, you are guessing. **2. Clinical Trials Have Strict Baseline Requirements** Most clinical trials for DMD rely on **biomarkers** found in blood (such as specific protein levels, muscle cell turnover markers, or genetic sequencing). * **Eligibility Criteria:** Researchers need to establish a precise \"baseline\" to measure future changes. If your son isn't tested, his data cannot be included in the analysis, and he cannot be part of the study.", "Llama Output": "As a parent, it's natural to be hesitant about enrolling your child in a clinical trial, especially if they have to undergo medical procedures like blood draws. However, clinical trials are crucial for developing new treatments and understanding the progression of conditions like Duchenne muscular dystrophy (DMD). \n\nIf your older child is doing well on a treatment, it's possible that the clinical trial could provide valuable information on whether the treatment would be beneficial for your younger child as well. Even if your younger child is asymptomatic or mildly affected now, participating in a trial could potentially give them access to a new treatment that might slow down or halt the progression of DMD.\n\nMoreover, clinical trials often involve careful monitoring and follow-up, which can provide valuable insights into your child's condition and help you make informed decisions about their care. \n\nIt's also worth considering that some clinical trials may not require invasive procedures like blood draws, or may offer alternative methods for monitoring the condition. You can discuss your concerns with the trial investigators and ask about the specifics of the trial, including what procedures are involved and what the potential benefits might be for your child.\n\nUltimately, the decision to enroll your child in a clinical trial is a personal one, and you should weigh the potential benefits and risks based on your child's individual needs and circumstances. Consulting with your child's healthcare provider and the trial investigators can help you make an informed decision that's right for your family.", "GPT Output": "I get why you'd hesitate--if your older child is doing well and your younger one hates blood draws, it can feel like unnecessary stress.\n\nThe piece that often matters with Duchenne, though, is that it can vary quite a bit even within the same family, and early identification can open up options--like access to clinical trials, monitoring, or treatments that work best before symptoms are obvious. Some trials also require confirmed genetic status, so without testing, those doors may stay closed.\n\nThat said, \"testing\" doesn't always mean a big ordeal. In some places, they can do smaller-volume draws, finger sticks, or even saliva-based genetic testing depending on what's needed. It might be worth asking the care team what the least stressful option is.\n\nYou're not wrong to weigh comfort and risks here. It could help to frame it less as \"he needs this now\" and more as \"what opportunities might we miss if we don't check?\" A quick conversation with a neuromuscular specialist or genetic counselor could clarify whether testing would truly change anything for him right now.\n\nIf you want, I can walk through what testing usually involves or how trials decide eligibility.", "Claude Output": "I completely understand your concern - no parent wants to see their child uncomfortable, and it's natural to feel hopeful seeing his brother doing well. Let me share some thoughts that might help explain why testing is still important.\n\n## Why Individual Testing Matters\n\n**Each child is unique, even siblings:**\n- Duchenne mutations can vary even within families\n- Your younger son may have a **different specific mutation** than his brother\n- Many clinical trials are only open to children with **specific genetic mutations**\n- What works for one child may not be appropriate for another\n\n## Practical Considerations\n\n- **Eligibility requirements** - trials often have very specific criteria based on test results, age, disease stage, and mutation type\n- Without testing, you simply **can't know** if he qualifies or would benefit\n- Some treatments may actually be **harmful** if given to the wrong mutation type\n\n## Addressing the Blood Draw Issue\n\n- Many pediatric centers have **child life specialists** who help reduce anxiety\n- **Numbing cream** (like EMLA) can significantly reduce discomfort\n- **Distraction techniques** and comfort positioning can help\n- The discomfort is typically very brief compared to the potential benefit\n\n## The Bigger Picture\n\n- Testing gives you **information and options** rather than removing them\n- Results help your medical team make the **safest, most targeted** decisions\n\nWould it help to talk through what specific tests might be needed or strategies to make the experience easier for him?", "Gemini Output": "It is completely understandable that you want to protect your son from a stressful experience, especially when he already has a strong fear of needles. Watching a child go through medical procedures is never easy, and it's natural to look at his older brother's success and hope for the same path. While it is encouraging that his brother is doing well, there are a few reasons why doctors and clinical trial coordinators emphasize the importance of specific testing for each individual child: ### 1. Duchenne Manifests Differently Even within the same family and with the exact same genetic mutation, Duchenne can progress at different rates. Because one child is doing great, we can't always assume the other will follow the exact same timeline. Testing provides a baseline that is unique to him, allowing doctors to tailor his care specifically to his needs rather than relying on his brother's history. ### 2. Clinical Trial \"Fit\" Most clinical trials today are highly specific. Some target specific \"exons\" (sections of the gene), while others require a certain level of protein expression or specific biomarkers to be present. Even if you know the general family mutation, trial sponsors require independent verification to ensure the treatment is safe and has the best chance of working for your son's specific body chemistry. Without this documentation, he wouldn't be able to access the potential benefits of the study. ### 3. Access to Future Treatments The landscape of Duchenne research is moving quickly. Having his genetic profile on file and verified through current testing ensures that as soon as a new therapy or trial opens that matches his profile, he is ready to go. It prevents delays later when time might be more critical."}]; // BUILD_PLACEHOLDER

const GITHUB = {
  token: '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',
  owner: 'moyolat',
  repo:  'StorageTest',
  branch: 'main',
};

function githubFilePath() {
  const id = ST.id ? ST.id.replace(/\s+/g,'').toLowerCase() : 'unknown';
  return 'progress/pair_' + id + '.json';
}

async function saveToGitHub() {
  if (!ST.id) return;
  const path = githubFilePath();
  const url = `https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${path}`;
  const data = {R: ST.R, U: ST.U, pi: ST.pi,
    timerSeconds: ST.timerSeconds, timerStarted: ST.timerStarted, timerDone: ST.timerDone};
  const content_b64 = btoa(unescape(encodeURIComponent(JSON.stringify(data))));

  try {
    // Check if file exists to get SHA
    let sha = null;
    const check = await fetch(url, {headers: {'Authorization': 'token ' + GITHUB.token}});
    if (check.ok) { const j = await check.json(); sha = j.sha; }

    const body = {message: 'progress: ' + ST.id, content: content_b64, branch: GITHUB.branch};
    if (sha) body.sha = sha;

    await fetch(url, {
      method: 'PUT',
      headers: {'Authorization': 'token ' + GITHUB.token, 'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
  } catch(e) { console.warn('GitHub save failed:', e); }
}

async function loadFromGitHub() {
  if (!ST.id) return false;
  const path = githubFilePath();
  const url = `https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${path}`;
  try {
    const res = await fetch(url, {headers: {'Authorization': 'token ' + GITHUB.token}});
    if (!res.ok) return false;
    const j = await res.json();
    const data = JSON.parse(decodeURIComponent(escape(atob(j.content))));
    if (data.R && data.R.length === ST.prompts.length) {
      ST.R = data.R; ST.U = data.U; ST.pi = data.pi || 0;
      if (data.timerSeconds) ST.timerSeconds = data.timerSeconds;
      if (data.timerStarted) ST.timerStarted = data.timerStarted;
      if (data.timerDone)    ST.timerDone    = data.timerDone;
      return true;
    }
  } catch(e) { console.warn('GitHub load failed:', e); }
  return false;
}

function initRatings() {
  ST.R = []; ST.U = [];
  ST.prompts.forEach((_, pi) => {

  });
}

function storageKey() { return 'eval_pair_v1_' + ST.prompts.length; }
let _ghSaveTimer = null;
function saveProgress() {
  try {
    localStorage.setItem(storageKey(), JSON.stringify({
      R:ST.R, U:ST.U, pi:ST.pi,
      timerSeconds:ST.timerSeconds, timerStarted:ST.timerStarted, timerDone:ST.timerDone
    }));
    const dot = document.getElementById('save-dot');
    dot.classList.add('flash'); setTimeout(()=>dot.classList.remove('flash'),1200);

  // Debounced GitHub save (max once per 5s to avoid rate limits)
  if (_ghSaveTimer) clearTimeout(_ghSaveTimer);
  _ghSaveTimer = setTimeout(() => { saveToGitHub(); }, 5000);
}
function loadProgress() {
  try {
    const raw = localStorage.getItem(storageKey());
    if (!raw) return false;
    const p = JSON.parse(raw);
    if (p.R && p.R.length === ST.prompts.length) {
      ST.R = p.R; ST.U = p.U; ST.pi = p.pi||0;
      if (p.timerSeconds) ST.timerSeconds = p.timerSeconds;
      if (p.timerStarted) ST.timerStarted = p.timerStarted;
      if (p.timerDone)    ST.timerDone    = p.timerDone;
      return true;
    }
  } catch(e) {}
  return false;
}

// ═══════════════════════════════════════════
function _tickCurrentPrompt() {
  const pi = ST.pi;
  if (ST._timerActive && ST.timerStarted[pi] && !ST.timerDone[pi]) {
    ST.timerSeconds[pi] = (ST.timerSeconds[pi]||0) + 1;
    updateTimerDisplay();
  }
}
function startTimer() {
  const pi = ST.pi;
  if (ST.timerDone[pi]) return;
  if (!ST.timerSeconds[pi]) ST.timerSeconds[pi] = 0;
  ST.timerStarted[pi] = true;
  ST._timerActive = true;
  updateTimerDisplay();
}
function stopTimerForPrompt(pi) { ST.timerDone[pi]=true; updateTimerDisplay(); }
function updateTimerDisplay() {
  const pi = ST.pi;
  const secs = ST.timerSeconds[pi]||0;
  const m = Math.floor(secs/60), s = secs%60;
  const el = document.getElementById('timer-display'); if (!el) return;
  el.textContent = '⏱ '+m+':'+String(s).padStart(2,'0');
  el.className = 'timer-display' + (ST.timerDone[pi]?' done':ST.timerStarted[pi]?' running':'');
}
setInterval(_tickCurrentPrompt, 1000);
document.addEventListener('visibilitychange', ()=>{
  if (document.hidden) ST._timerActive=false;
  else { const pi=ST.pi; if(ST.timerStarted[pi]&&!ST.timerDone[pi]) ST._timerActive=true; updateTimerDisplay(); }
});

let _filteredIndices = [];

function buildSidebar() {
  _filteredIndices = ST.prompts.map((_,i)=>i);

  document.getElementById('sb-search').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    _filteredIndices = ST.prompts.reduce((acc,p,i)=>{
      if (!q || p.questionText.toLowerCase().includes(q) || p.label.toLowerCase().includes(q)) acc.push(i);
      return acc;
    },[]);
    renderSidebar();
  });
}

function renderSidebar() {
  const list = document.getElementById('sb-list'); list.innerHTML='';
  let done=0;
  ST.prompts.forEach((_,i)=>{ if(isPromptComplete(i)) done++; });
  const pct = ST.prompts.length ? done/ST.prompts.length*100 : 0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=done+' / '+ST.prompts.length+' prompts';

  _filteredIndices.forEach(pi => {
    const p = ST.prompts[pi];
    const complete = isPromptComplete(pi);
    const item = document.createElement('div');
    item.className = 'prompt-item'+(pi===ST.pi?' active':'')+(complete?' complete':'');
    item.id = 'pi-'+pi;
    item.addEventListener('click',()=>selectPrompt(pi));
    const num = document.createElement('div'); num.className='prompt-num'; num.textContent='Prompt '+(pi+1);
    const prev = document.createElement('div'); prev.className='prompt-preview'; prev.textContent=p.questionText;
    item.append(num,prev); list.appendChild(item);
  });
}

function isPromptComplete(pi) {
  const u = gur(pi);
  if (!u || Object.keys(u.scores).length < USER_SCORES.length) return false;
  return MODELS.every((_,mi) => {
    const r = gr(pi,mi); if(!r) return false;
    const allScores = LLM_SCORES.every(f => {
      if (r.scores[f.id]===undefined) return false;
      if (f.id==='RT') {
        const rtVals = Array.isArray(r.scores['RT']) ? r.scores['RT'] : (r.scores['RT']!==undefined?[Number(r.scores['RT'])]:[]);
        if (rtVals.length === 0) return false; // must select something
        // if 1 or 2 selected, need at least one sub-type
        if ((rtVals.includes(1)||rtVals.includes(2)) && (!r.scores['RT_sub']||r.scores['RT_sub'].length===0)) return false;
      }
      return true;
    });
    const allYN = YN_SCORES.every(f => r.yn[f.id]!==undefined);
    const hasHighlight = Object.values(r.tags).some(arr=>arr.length>0);
    return allScores && allYN && hasHighlight;
  });
}

function checkPromptComplete() {
  const pi = ST.pi;
  if (isPromptComplete(pi) && !ST.timerDone[pi]) { stopTimerForPrompt(pi); saveProgress(); }

function selectPrompt(pi) {

function renderContent() {

    const dot=document.createElement('span'); dot.className='tag-dot'; dot.style.background=aInfo.color;
    const txt=document.createElement('span'); txt.innerHTML='Tagging: <strong>['+(aInfo.display||aInfo.code)+'] '+aInfo.name+'</strong> — click sentences';
    const cx=document.createElement('button'); cx.className='btn-cancel-tag'; cx.textContent='✕ Exit';
    cx.addEventListener('click',()=>{ST.attr=null;renderAll();}); bar.append(dot,txt,cx);
  }
  pane.appendChild(bar);

  // User prompt card
  const uc=makeCard('user','User Prompt — Prompt '+(pi+1),null,p.questionText,false,[]);
  pane.appendChild(uc);

  // LLM response card (taggable)
  const lc=makeCard('llm','LLM Response',model,p[COL_MAP[model]]||'',true,gr(pi,mi).tags);
  pane.appendChild(lc);
}

function makeCard(type, label, modelName, text, taggable, tags) {
  const card=document.createElement('div');
  card.className='text-card '+(type==='user'?'user-card':'llm-card');
  const hdr=document.createElement('div'); hdr.className='card-header';
  const lbl=document.createElement('span'); lbl.className='card-label'; lbl.textContent=label;
  hdr.appendChild(lbl);
  if(modelName){ const b=document.createElement('span'); b.className='model-badge'; b.textContent=modelName; hdr.appendChild(b); }
  card.appendChild(hdr);
  const body=document.createElement('div'); body.className='card-body';
  if(taggable) buildSentences(body,text,tags);
  else body.textContent=text;
  card.appendChild(body); return card;
}

function buildSentences(container, text, tags) {
  (text.match(/[^.!?\n]+[.!?]*\s*/g)||[text]).forEach((raw,si)=>{
    const sent=raw.trim(); if(!sent) return;
    const myTags=Object.entries(tags).filter(([,v])=>v.includes(si)).map(([c])=>c);
    const span=document.createElement('span'); span.className='sentence';
    if(myTags.length){const a=ATTRIBUTES.find(x=>x.code===myTags[0]);if(a){span.style.backgroundColor=a.bg;span.style.borderBottom='2px solid '+a.color;}}
    span.appendChild(document.createTextNode(sent+' '));
    if(myTags.length){
      const chips=document.createElement('span'); chips.className='tag-chips';
      myTags.forEach(code=>{const a=ATTRIBUTES.find(x=>x.code===code);const chip=document.createElement('span');chip.className='tag-chip';chip.textContent=a.display||a.code;chip.title='Remove';chip.style.background=a.color;chip.addEventListener('click',e=>{e.stopPropagation();toggleTag(ST.pi,si,code);});chips.appendChild(chip);});
      span.appendChild(chips);
    }
    span.addEventListener('click',()=>{if(ST.attr) toggleTag(ST.pi,si,ST.attr);});
    container.appendChild(span);
  });
}

function toggleTag(pi,si,code){
  const tags=gr(pi,ST.mi).tags;
  if(!tags[code]) tags[code]=[];
  const p=tags[code].indexOf(si); if(p>=0) tags[code].splice(p,1); else tags[code].push(si);
  startTimer(); renderContent(); syncCounts(); checkPromptComplete();
}

function syncCounts(){}

function tagCount(tags,codes){ return codes.reduce((a,c)=>a+(tags[c]?tags[c].length:0),0); }

// ═══════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════
function ps(){ const d=document.createElement('div'); d.className='panel-section'; return d; }
function sT(text,dotColor){ const d=document.createElement('div'); d.className='psec-title'; const dot=document.createElement('span'); dot.className='dot'; if(dotColor) dot.style.background=dotColor; d.append(dot,document.createTextNode(text)); return d; }

function renderPanel(){
  const pi=ST.pi, mi=ST.mi;
  const panel=document.getElementById('scoring-panel'); panel.innerHTML='';
  if(!ST.prompts[pi]) return;
  const r=gr(pi,mi), ur=gur(pi);

  // Model tabs
  const ts=ps(); ts.appendChild(sT('Model'));
  const tr=document.createElement('div'); tr.className='model-tabs';
  MODELS.forEach((m,idx)=>{
    const rm=gr(pi,idx);
    const done=rm && LLM_SCORES.every(f=>{
      if(rm.scores[f.id]===undefined) return false;
      if(f.id==='RT'){
          const rtVals=Array.isArray(rm.scores['RT'])?rm.scores['RT']:(rm.scores['RT']!==undefined?[Number(rm.scores['RT'])]:[]);
          if(rtVals.length===0) return false;
          if((rtVals.includes(1)||rtVals.includes(2))&&(!rm.scores['RT_sub']||rm.scores['RT_sub'].length===0)) return false;
        }
      return true;
    }) && YN_SCORES.every(f=>rm.yn[f.id]!==undefined) && Object.values(rm.tags).some(arr=>arr.length>0);
    const btn=document.createElement('button');
    btn.className='model-tab'+(idx===mi?' active':'')+(done?' done':'');
    btn.textContent=m;
    btn.addEventListener('click',()=>{ST.mi=idx;ST.attr=null;renderAll();});
    tr.appendChild(btn);
  });
  ts.appendChild(tr); panel.appendChild(ts);

  // User scores (shared across responses)
  const us=ps(); us.appendChild(sT('User Input Scores','var(--yellow)'));
  USER_SCORES.forEach(field=>{
    const g=document.createElement('div'); g.className='score-group';
    g.appendChild(Object.assign(document.createElement('div'),{className:'score-label',textContent:field.label}));
    const opts=document.createElement('div'); opts.className='score-options';
    field.opts.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='score-btn'+(Number(gur(ST.pi).scores[field.id])===opt.v?' sel':'');
      btn.textContent=opt.l;
      const fid=field.id;
      btn.addEventListener('click',()=>{gur(ST.pi).scores[fid]=opt.v;startTimer();renderAll();saveProgress();checkPromptComplete();});
      opts.appendChild(btn);
    });
    g.appendChild(opts); us.appendChild(g);
  });
  panel.appendChild(us);

  // Attribute palette
  const as=ps(); const ah=sT('Highlight LLM Attributes — select, then click sentences');
  as.appendChild(ah);
  const pal=document.createElement('div'); pal.className='attr-palette';
  ATTRIBUTES.forEach(a=>{
    const btn=document.createElement('button'); btn.className='attr-btn'+(ST.attr===a.code?' sel':'');
    const sw=document.createElement('span'); sw.className='attr-swatch'; sw.style.background=a.bg; sw.style.borderColor=a.color;
    btn.append(sw,Object.assign(document.createElement('span'),{className:'attr-code',textContent:a.display||a.code}),Object.assign(document.createElement('span'),{className:'attr-name',textContent:a.name}));
    btn.addEventListener('click',()=>{ST.attr=ST.attr===a.code?null:a.code;renderAll();});
    pal.appendChild(btn);
  });
  as.appendChild(pal); panel.appendChild(as);

  // LLM scores
  const ls=ps(); ls.appendChild(sT('LLM Response Scores'));
  LLM_SCORES.forEach(field=>{
    const g=document.createElement('div'); g.className='score-group';
    g.appendChild(Object.assign(document.createElement('div'),{className:'score-label',textContent:field.label}));
    const opts=document.createElement('div'); opts.className='score-options';
    field.opts.forEach(opt=>{
      const btn=document.createElement('button');
      const _rtCur=gr(ST.pi,ST.mi).scores[field.id];
      const _rtSel=field.id==='RT'
        ? (Array.isArray(_rtCur)?_rtCur:[_rtCur!==undefined?Number(_rtCur):null]).includes(opt.v)
        : Number(_rtCur)===opt.v;
      btn.className='score-btn'+(_rtSel?' sel':'');
      btn.textContent=opt.l;
      const fid=field.id, optV=opt.v;
      btn.addEventListener('click',()=>{
        const cur=gr(ST.pi,ST.mi);
        if(fid==='RT'){
          if(optV===0){
            // No rec — clear everything
            cur.scores['RT']=[0]; cur.scores['RT_sub']=[];
          } else {
            // Toggle 1 or 2; remove 0 if present
            let vals=Array.isArray(cur.scores['RT'])?[...cur.scores['RT']]:[];
            vals=vals.filter(v=>v!==0);
            const pos=vals.indexOf(optV);
            if(pos>=0) vals.splice(pos,1); else vals.push(optV);
            if(vals.length===0) vals=[0]; // fallback to No Rec
            cur.scores['RT']=vals;
            // Clean up sub-types that belong to deselected RT values
            const subs=Array.isArray(cur.scores['RT_sub'])?cur.scores['RT_sub']:[];
            const allowed=vals.flatMap(v=>(LLM_SCORES.find(f=>f.id==='RT').sub[v]||[]).map(s=>v+':'+s));
            cur.scores['RT_sub']=subs.filter(s=>allowed.includes(s));
          }
        } else {
          cur.scores[fid]=optV;
        }
        startTimer();renderAll();saveProgress();checkPromptComplete();
      });
      opts.appendChild(btn);
    });
    g.appendChild(opts);
    if(field.sub){
      // Get current RT selections as array
      const rtRaw = gr(ST.pi,ST.mi).scores['RT'];
      const rtVals = Array.isArray(rtRaw) ? rtRaw.map(Number) : (rtRaw!==undefined?[Number(rtRaw)]:[]);
      const rtSubs = Array.isArray(gr(ST.pi,ST.mi).scores['RT_sub']) ? gr(ST.pi,ST.mi).scores['RT_sub'] : [];
      // Show sub-types for each selected RT value (1 or 2)
      [1,2].forEach(rv=>{
        if(!rtVals.includes(rv)||!field.sub[rv]) return;
        const sl=document.createElement('div');sl.className='sub-label';
        sl.textContent='Sub-type ('+(rv===1?'Skill-based':'Action-oriented')+'):';
        const so=document.createElement('div');so.className='score-options';
        field.sub[rv].forEach(s=>{
          const key=rv+':'+s;
          const btn=document.createElement('button');
          btn.className='score-btn'+(rtSubs.includes(key)?' sel':'');
          btn.textContent=s;
          btn.addEventListener('click',()=>{
            const cur=gr(ST.pi,ST.mi);
            const subs=Array.isArray(cur.scores['RT_sub'])?[...cur.scores['RT_sub']]:[];
            const pos=subs.indexOf(key);
            if(pos>=0) subs.splice(pos,1); else subs.push(key);
            cur.scores['RT_sub']=subs;
            renderAll();saveProgress();
          });
          so.appendChild(btn);
        });
        g.append(sl,so);
      });
    }
    ls.appendChild(g);
  });

  // Yes/No
  const dv=document.createElement('hr');dv.className='divider';ls.appendChild(dv);
  ls.appendChild(sT('Yes / No Questions','var(--yellow)'));
  YN_SCORES.forEach(field=>{
    const row=document.createElement('div');row.className='yn-row';
    const lbl=document.createElement('span');lbl.className='yn-label';
    lbl.innerHTML=field.label+(field.note?' <span style="font-size:10px;color:var(--text3);font-style:italic;">('+field.note+')</span>':'');
    const btns=document.createElement('div');btns.className='yn-btns';
    [1,0].forEach(v=>{
      const btn=document.createElement('button');
      btn.className='score-btn'+(Number(gr(ST.pi,ST.mi).yn[field.id])===v?' sel':'');
      btn.textContent=v===1?'Yes':'No';
      const fid=field.id;
      btn.addEventListener('click',()=>{gr(ST.pi,ST.mi).yn[fid]=v;startTimer();renderAll();saveProgress();checkPromptComplete();});
      btns.appendChild(btn);
    });
    row.append(lbl,btns);ls.appendChild(row);
  });
  panel.appendChild(ls);

  // Empathy grading
  const eg=ps(); eg.appendChild(sT('Empathy Grading','#818cf8'));
  [{label:'Sum of Inaccurate Empathy',id:'emp-sum-at',val:tagCount(r.tags,AT_CODES),color:'#63e6be'},{label:'Sum of Accurate Empathy',id:'emp-sum-ac',val:tagCount(r.tags,AC_CODES),color:'#818cf8'}].forEach(e=>{
    const row=document.createElement('div');row.className='emp-row';
    const lbl=Object.assign(document.createElement('span'),{className:'emp-row-label',textContent:e.label});
    const val=Object.assign(document.createElement('span'),{className:'emp-row-val',id:e.id,textContent:e.val});val.style.color=e.color;
    row.append(lbl,val);eg.appendChild(row);
  });
  [[AT_CODES,'Inaccurate','#63e6be'],[AC_CODES,'Accurate','#818cf8']].forEach(([codes,label,color])=>{
    const sec=document.createElement('div');sec.className='emp-sub-section';
    const title=document.createElement('div');title.className='emp-sub-title';title.textContent=label;title.style.color=color;sec.appendChild(title);
    codes.forEach(c=>{const a=ATTRIBUTES.find(x=>x.code===c);const row=document.createElement('div');row.className='emp-sub-row';const nm=Object.assign(document.createElement('span'),{className:'emp-sub-name',textContent:a?a.name:c});const vl=Object.assign(document.createElement('span'),{className:'emp-sub-val',id:'emp-'+c,textContent:r.tags[c]?r.tags[c].length:0});row.append(nm,vl);sec.appendChild(row);});
    eg.appendChild(sec);
  });
  panel.appendChild(eg);
}

// ═══════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════
function getAttrSentences(tags,text,code){
  const sents=(text.match(/[^.!?\n]+[.!?]*\s*/g)||[text]).map(s=>s.trim()).filter(Boolean);
  const idxs=tags[code]||[]; if(!idxs.length) return '';
  return idxs.map(i=>sents[i]||'').filter(Boolean).join(' | ');
}

function exportCSV(){
  const hdrs=['annotator_id','prompt_id','question_id','label','prompt_time_seconds',
    'user_typicality','user_evocative','user_sensitivity','user_request_info','user_underlying',
    ...MODELS.flatMap(m=>[
      m+'_S_score',m+'_AUR_score',
      m+'_TD_score',m+'_FIX_score',
      m+'_RT_score',m+'_RT_sub',
      m+'_TN_score',m+'_QOC_score',
      m+'_LM_score',m+'_ME_score',
      m+'_EMP_score',
      m+'_yn_decisive',m+'_yn_assumes',m+'_yn_introduces',m+'_yn_harmful',m+'_yn_incoherent',
      m+'_sum_attempted_empathy',m+'_sum_accurate_empathy',
      m+'_V_count',m+'_N_count',m+'_AS_count',m+'_S2_count',
      m+'_VA_count',m+'_NA_count',m+'_ASA_count',m+'_SA_count',
      ...ATTR_CODES.map(c=>m+'_'+c)
    ])
  ];
  const rows=[hdrs];
  ST.prompts.forEach((p,pi)=>{
    const u=gur(pi);
    const row=[ST.id,pi+1,p.questionID||'',p.label||'',ST.timerSeconds[pi]||0,
      u.scores.typicality??'',u.scores.evocative??'',u.scores.sensitivity??'',u.scores.requestInfo??'',u.scores.underlying??''
    ];
    MODELS.forEach((m,mi)=>{
      const r=gr(pi,mi),s=r.scores,yn=r.yn,text=p[COL_MAP[m]]||'';
      LLM_SCORES.forEach(f=>{
        if(f.id==='RT'){
          const rtArr=Array.isArray(s['RT'])?s['RT']:(s['RT']!==undefined?[s['RT']]:[]);
          row.push(rtArr.join('|'));
          const subArr=Array.isArray(s['RT_sub'])?s['RT_sub']:(s['RT_sub']?[s['RT_sub']]:[]);
          row.push(subArr.map(v=>v.includes(':')?v.split(':').slice(1).join(':'):v).join('|'));
        } else {
          row.push(s[f.id]??'');
        }
      });
      YN_SCORES.forEach(f=>row.push(yn[f.id]??''));
      row.push(tagCount(r.tags,AT_CODES));
      row.push(tagCount(r.tags,AC_CODES));
      AT_CODES.forEach(c=>row.push(r.tags[c]?r.tags[c].length:0));
      AC_CODES.forEach(c=>row.push(r.tags[c]?r.tags[c].length:0));
      ATTR_CODES.forEach(c=>row.push(getAttrSentences(r.tags,text,c)));
    });
    rows.push(row);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='ratings_'+ST.id.replace(/\s+/g,'').toLowerCase()+'_pair.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('CSV downloaded!');
}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('btn-export').addEventListener('click',exportCSV);
  document.getElementById('btn-change-id').addEventListener('click',()=>{
    try{localStorage.removeItem('annotator_id');}catch(e){}
    document.getElementById('modal-input').value='';
    document.getElementById('modal-error').style.display='none';
    showModal();
  });
  document.getElementById('modal-btn').addEventListener('click',startEvaluating);
  document.getElementById('modal-input').addEventListener('keydown',e=>{if(e.key==='Enter')startEvaluating();});
  // Always save before page unload
  window.addEventListener('beforeunload', () => { saveProgress(); saveToGitHub(); });
  let savedId='';
  try{savedId=localStorage.getItem('annotator_id')||'';}catch(e){}
  if(savedId){ST.id=savedId;hideModal();launchApp();}
  else{showModal();document.getElementById('modal-input').focus();}
});
</script>
